name: Build DuduClock

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install arduino-cli
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | BINDIR=$HOME/.local/bin sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install ESP32 core
        run: |
          arduino-cli config init --overwrite
          arduino-cli config add board_manager.additional_urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@2.0.9

      - name: Install Arduino libraries
        run: |
          arduino-cli lib install "OneButton@2.6.2"
          arduino-cli lib install "TFT_eSPI@2.5.43"
          arduino-cli lib install "ArduinoJson@7.4.3"
          arduino-cli lib install "TaskScheduler@4.0.8"

      - name: Set build time
        run: |
          BUILD_TIME=$(TZ=Asia/Shanghai date '+%y/%m/%d %H:%M:%S')
          echo "BUILD_TIME=$BUILD_TIME" >> "$GITHUB_ENV"
          echo "BUILD_TIME_YY=$(TZ=Asia/Shanghai date '+%y')" >> "$GITHUB_ENV"
          echo "BUILD_TIME_MM=$(TZ=Asia/Shanghai date '+%m')" >> "$GITHUB_ENV"
          echo "BUILD_TIME_DD=$(TZ=Asia/Shanghai date '+%d')" >> "$GITHUB_ENV"
          echo "BUILD_TIME_HH=$(TZ=Asia/Shanghai date '+%H')" >> "$GITHUB_ENV"
          echo "BUILD_TIME_MIN=$(TZ=Asia/Shanghai date '+%M')" >> "$GITHUB_ENV"
          echo "BUILD_TIME_SS=$(TZ=Asia/Shanghai date '+%S')" >> "$GITHUB_ENV"

      - name: Compile firmware
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:AirM2M_CORE_ESP32C3:UploadSpeed=921600,CDCOnBoot=default,CPUFreq=80,FlashFreq=80,PartitionScheme=huge_app,DebugLevel=none,EraseFlash=all \
            --libraries ./libraries \
            --build-property compiler.cpp.extra_flags="-DBUILD_TIME_YY=${BUILD_TIME_YY} -DBUILD_TIME_MM=${BUILD_TIME_MM} -DBUILD_TIME_DD=${BUILD_TIME_DD} -DBUILD_TIME_HH=${BUILD_TIME_HH} -DBUILD_TIME_MIN=${BUILD_TIME_MIN} -DBUILD_TIME_SS=${BUILD_TIME_SS} -DUSER_SETUP_LOADED=1 -DST7789_DRIVER=1 -DTFT_WIDTH=240 -DTFT_HEIGHT=320 -DTFT_RGB_ORDER=TFT_BGR -DTFT_MISO=-1 -DTFT_MOSI=3 -DTFT_SCLK=2 -DTFT_CS=7 -DTFT_DC=4 -DTFT_RST=5 -DSPI_FREQUENCY=40000000 -DSPI_READ_FREQUENCY=20000000 -DSMOOTH_FONT=1" \
            --build-property compiler.c.extra_flags="-DBUILD_TIME_YY=${BUILD_TIME_YY} -DBUILD_TIME_MM=${BUILD_TIME_MM} -DBUILD_TIME_DD=${BUILD_TIME_DD} -DBUILD_TIME_HH=${BUILD_TIME_HH} -DBUILD_TIME_MIN=${BUILD_TIME_MIN} -DBUILD_TIME_SS=${BUILD_TIME_SS} -DUSER_SETUP_LOADED=1 -DST7789_DRIVER=1 -DTFT_WIDTH=240 -DTFT_HEIGHT=320 -DTFT_RGB_ORDER=TFT_BGR -DTFT_MISO=-1 -DTFT_MOSI=3 -DTFT_SCLK=2 -DTFT_CS=7 -DTFT_DC=4 -DTFT_RST=5 -DSPI_FREQUENCY=40000000 -DSPI_READ_FREQUENCY=20000000 -DSMOOTH_FONT=1" \
            --build-path build \
            .

      - name: Install esptool
        run: |
          python3 -m pip install --user esptool

      - name: Merge flash bin
        run: |
          mkdir -p release-bin
          python3 -m esptool --chip esp32c3 merge_bin \
            -o release-bin/AirM2M_CORE_ESP32C3_240x320_DuduClock.ino.bin \
            0x0 build/DuduClock.ino.bootloader.bin \
            0x8000 build/DuduClock.ino.partitions.bin \
            0x10000 build/DuduClock.ino.bin

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-bin/*.bin
          body: |
            ## 刷机说明
            本次发布只保留一个可刷机的 `.bin` 文件。
            `AirM2M_CORE_ESP32C3` 就是合宙 ESP32-C3 开发板。
            这个单文件已经把 bootloader、分区表和主程序合并好了，直接刷它就行。

            下载后只保留这一个文件：
            - `AirM2M_CORE_ESP32C3_240x320_DuduClock.ino.bin`

            推荐烧录方式：
            1. 连接开发板到电脑。
            2. 使用仓库里的 `build-flash-monitor.ps1` 或你常用的 ESP32 烧录工具。
            3. 选择正确串口后直接刷入这个 `.bin` 文件。

            这个 Release 里不再提供 `.elf`、`.map` 或拆分镜像，它们只用于调试，不参与刷机。

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: DuduClock-firmware
          path: |
            release-bin/*.bin
          retention-days: 7
